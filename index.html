<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Pertamaku di GitHub Pages</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8; /* Warna latar belakang abu-abu kebiruan */
            color: #333333;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); /* Efek bayangan */
            max-width: 600px;
            margin: 0 auto; /* Membuat kotak berada di tengah layar */
        }
        h1 {
            color: #0056b3; /* Warna biru untuk judul */
            margin-top: 0;
        }
        p {
            line-height: 1.6;
            font-size: 16px;
        }
        .tombol {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background-color: #28a745; /* Warna hijau untuk tombol */
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .tombol:hover {
            background-color: #218838; /* Warna berubah saat mouse diarahkan */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Halo, Dunia! 🚀</h1>
        <p>Selamat datang di website pertama saya yang di-hosting menggunakan <strong>GitHub Pages</strong>.</p>
        <p>Web statik ini aktif 24/7 secara gratis. Ini adalah contoh HTML dasar yang sudah digabungkan dengan CSS agar tampilannya lebih menarik.</p>
        
        <a href="https://github.com" target="_blank" class="tombol">Kunjungi GitHub Saya</a>
    </div>

</body>
      </html>
